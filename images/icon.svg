<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#grad)"/>
  <g transform="translate(64,64)">
    <!-- Git 分支符号 -->
    <circle cx="-20" cy="-25" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="20" cy="-25" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="25" r="6" fill="none" stroke="white" stroke-width="3"/>
    <line x1="-20" y1="-19" x2="0" y2="19" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-19" x2="0" y2="19" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- 闪光点 -->
    <circle cx="28" cy="-35" r="3" fill="#ffd700"/>
    <circle cx="35" cy="-28" r="2" fill="#ffd700"/>
    <circle cx="32" cy="-40" r="1.5" fill="#ffd700"/>
  </g>
</svg>
